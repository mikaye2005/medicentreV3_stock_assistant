<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MediCentre Stock Assistant{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --line: #e2e8f0;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-soft: #dbeafe;
            --green: #059669;
            --green-soft: #d1fae5;
            --amber: #d97706;
            --amber-soft: #fef3c7;
            --red: #dc2626;
            --red-soft: #fee2e2;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #f8fafc;
            border-right: 1px solid var(--line);
            padding: 26px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .brand-text h2 {
            margin: 0;
            font-size: 24px;
            line-height: 1.1;
        }

        .brand-text p {
            margin: 4px 0 0 0;
            font-size: 14px;
            color: var(--muted);
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-links a {
            text-decoration: none;
            color: #334155;
            padding: 13px 14px;
            border-radius: 14px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: var(--primary-soft);
            color: var(--primary);
        }

        .sidebar-note {
            background: white;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .sidebar-note h4 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }

        .sidebar-note p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
            font-size: 14px;
        }

        .main {
            flex: 1;
            padding: 26px;
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 20px;
        }

        .top-pill {
            background: white;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px 14px;
            color: var(--muted);
            font-weight: 600;
            box-shadow: var(--shadow);
        }

        .hero {
            background: white;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 26px;
            margin-bottom: 22px;
        }

        .hero h1 {
            margin: 0 0 8px 0;
            font-size: 38px;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            margin-bottom: 22px;
        }

        .metric-card {
            background: white;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .metric-icon {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }

        .metric-blue { background: var(--primary-soft); color: var(--primary); }
        .metric-green { background: var(--green-soft); color: var(--green); }
        .metric-amber { background: var(--amber-soft); color: var(--amber); }
        .metric-red { background: var(--red-soft); color: var(--red); }

        .metric-card h3 {
            margin: 0 0 8px 0;
            color: var(--muted);
            font-size: 15px;
        }

        .metric-value {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .metric-sub {
            color: var(--muted);
            font-size: 13px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 22px;
            margin-bottom: 22px;
        }

        .panel {
            background: white;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
        }

        .panel h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .muted {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        textarea {
            width: 100%;
            min-height: 135px;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            background: var(--surface-soft);
            font-size: 16px;
            resize: vertical;
        }

        button {
            margin-top: 14px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.95;
        }

        .error {
            margin-top: 14px;
            background: var(--red-soft);
            color: var(--red);
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
        }

        .answer-box,
        .content-box {
            margin-top: 14px;
            background: var(--surface-soft);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            line-height: 1.6;
            font-family: Consolas, monospace;
        }

        .item-list {
            display: grid;
            gap: 12px;
        }

        .item-card {
            background: var(--surface-soft);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
        }

        .item-card strong {
            display: block;
            margin-bottom: 6px;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-green { background: var(--green-soft); color: var(--green); }
        .badge-red { background: var(--red-soft); color: var(--red); }

        .footer-note {
            text-align: center;
            margin-top: 14px;
            color: var(--muted);
            font-size: 14px;
        }

        @media (max-width: 1100px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 820px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div>
                <div class="brand">
                    <div class="brand-icon">✚</div>
                    <div class="brand-text">
                        <h2>MediCentre</h2>
                        <p>Stock Assistant AI</p>
                    </div>
                </div>

                <div class="nav-links">
                    <a class="active" href="{% url 'assistant:test_ollama' %}">Dashboard</a>
                    <a href="{% url 'assistant:conversation_history' %}">History</a>
                    <a href="/admin/">Admin</a>
                </div>
            </div>

            <div class="sidebar-note">
                <h4>Assistant Help</h4>
                <p>
                    Ask questions about stock quantities, movement, batches,
                    expiry dates, stock take sessions, and branch-linked items.
                </p>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <div class="top-pill">Stock Module Overview</div>
            </div>

            {% block content %}{% endblock %}

            <div class="footer-note">
                © 2026 MediCentre Stock Assistant
            </div>
        </main>
    </div>
</body>
</html>

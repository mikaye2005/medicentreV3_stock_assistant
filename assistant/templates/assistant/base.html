<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MediCentre Stock Assistant{% endblock %}</title>
    <style>
        :root {
            --bg: #202123;
            --sidebar: #171717;
            --panel: #212121;
            --panel-soft: #2a2b32;
            --text: #ececf1;
            --muted: #a1a1aa;
            --line: #343541;
            --accent: #10a37f;
            --accent-soft: rgba(16, 163, 127, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app-shell {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 290px;
            background: var(--sidebar);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            padding: 18px 14px;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 18px;
            padding: 10px 12px;
        }

        .brand small {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
            font-weight: normal;
        }

        .sidebar-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 18px;
        }

        .sidebar-link {
            display: block;
            text-decoration: none;
            color: var(--text);
            background: transparent;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px 14px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: var(--panel-soft);
            border-color: #4b5563;
        }

        .history-title {
            color: var(--muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 14px 10px 10px 10px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .history-item {
            display: block;
            text-decoration: none;
            color: var(--text);
            background: transparent;
            border-radius: 10px;
            padding: 10px 12px;
            border: 1px solid transparent;
            transition: 0.2s ease;
        }

        .history-item:hover {
            background: var(--panel-soft);
            border-color: var(--line);
        }

        .history-item-title {
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .history-item-time {
            font-size: 12px;
            color: var(--muted);
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 16px;
        }

        .sidebar-footer a {
            display: block;
            text-decoration: none;
            color: var(--muted);
            font-size: 14px;
            padding: 10px 12px;
            border-radius: 10px;
        }

        .sidebar-footer a:hover {
            background: var(--panel-soft);
            color: var(--text);
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .main-inner {
            width: 100%;
            max-width: 980px;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-header h1 {
            margin: 0 0 8px 0;
            font-size: 34px;
        }

        .page-header p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 18px;
        }

        .panel h2 {
            margin-top: 0;
            font-size: 22px;
        }

        .muted {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        textarea,
        input[type="text"],
        input[type="date"] {
            width: 100%;
            background: #2b2d31;
            color: var(--text);
            border: 1px solid #3f3f46;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.95;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 18px;
        }

        .metric-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 18px;
        }

        .metric-card h3 {
            margin: 0 0 8px 0;
            color: var(--muted);
            font-size: 14px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .metric-sub {
            color: var(--muted);
            font-size: 13px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1.35fr 1fr;
            gap: 18px;
        }

        .answer-block {
            background: #2b2d31;
            border: 1px solid #3f3f46;
            border-radius: 14px;
            padding: 14px;
            margin-top: 12px;
        }

        .answer-block h3 {
            margin-top: 0;
            font-size: 16px;
            color: #d4d4d8;
        }

        .item-list {
            display: grid;
            gap: 12px;
        }

        .item-card {
            background: #2b2d31;
            border: 1px solid #3f3f46;
            border-radius: 14px;
            padding: 14px;
        }

        .item-card strong {
            display: block;
            margin-bottom: 6px;
        }

        .error {
            background: rgba(220, 38, 38, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(220, 38, 38, 0.35);
            border-radius: 12px;
            padding: 12px;
            margin-top: 14px;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            line-height: 1.6;
            font-family: Consolas, monospace;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 12px;
            align-items: end;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-green {
            background: rgba(5, 150, 105, 0.15);
            color: #6ee7b7;
        }

        .badge-red {
            background: rgba(220, 38, 38, 0.15);
            color: #fca5a5;
        }

        @media (max-width: 1100px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 860px) {
            .app-shell {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                MediCentre
                <small>Stock Assistant AI</small>
            </div>

            <div class="sidebar-actions">
                <a href="{% url 'assistant:test_ollama' %}"
                   class="sidebar-link {% if current_page == 'assistant' %}active{% endif %}">
                    New Chat
                </a>

                <a href="{% url 'assistant:conversation_history' %}"
                   class="sidebar-link {% if current_page == 'history' %}active{% endif %}">
                    Conversation History
                </a>
            </div>

            <div class="history-title">Recent Chats</div>

            <div class="history-list">
                {% for log in recent_logs %}
                    <a href="{% url 'assistant:conversation_history' %}" class="history-item">
                        <div class="history-item-title">
                            {{ log.question|truncatechars:42 }}
                        </div>
                        <div class="history-item-time">
                            {{ log.created_at }}
                        </div>
                    </a>
                {% empty %}
                    <div class="history-item">
                        <div class="history-item-title">No saved conversations yet.</div>
                    </div>
                {% endfor %}
            </div>

            <div class="sidebar-footer">
                <a href="/admin/">Admin</a>
            </div>
        </aside>

        <main class="main">
            <div class="main-inner">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
